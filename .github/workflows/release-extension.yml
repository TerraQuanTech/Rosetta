name: Release Extension

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Bump version
        id: version
        working-directory: packages/vscode-extension
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "tag=ext-v${NEW}" >> "$GITHUB_OUTPUT"

          # Update package.json version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${NEW}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "

      - name: Build core package
        run: bun run --filter @terraquantech/rosetta-core build

      - name: Build extension
        run: bun run build:vscode

      - name: Package extension
        working-directory: packages/vscode-extension
        run: npx @vscode/vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        working-directory: packages/vscode-extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --no-dependencies

      - name: Publish to Open VSX Registry
        working-directory: packages/vscode-extension
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish --no-dependencies || true

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/vscode-extension/package.json
          git commit -m "Release extension ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Rosetta VS Code Extension ${{ steps.version.outputs.version }}
          body: |
            ## VS Code Extension ${{ steps.version.outputs.version }}

            Install from the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=TerraQuantTech.rosetta-i18n) or search "Rosetta i18n" in VS Code extensions.
          files: packages/vscode-extension/*.vsix
